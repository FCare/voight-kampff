{% extends "base.html" %}

{% block title %}Voight-Kampff - Inscription{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-header">
        <h1>Créer un compte</h1>
        <p>Rejoignez l'écosystème d'applications</p>
    </div>
    
    <div class="auth-form">
        <div id="error-message" class="error-message"></div>
        <div id="success-message" class="success-message"></div>
        
        <form id="register-form">
            <div class="form-group">
                <label for="reg-username">Nom d'utilisateur</label>
                <input type="text" id="reg-username" name="username" class="form-input"
                       placeholder="Votre nom d'utilisateur" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="reg-email">Email</label>
                <input type="email" id="reg-email" name="email" class="form-input"
                       placeholder="votre@email.com" required autocomplete="email">
            </div>

            <div class="form-group">
                <label for="reg-password">Mot de passe</label>
                <input type="password" id="reg-password" name="password" class="form-input"
                       placeholder="••••••••" required autocomplete="new-password">
                <div id="password-rules" class="password-rules">
                    <div class="password-rule" id="rule-length">
                        <span class="rule-icon">✗</span>
                        <span class="rule-text">Au moins 8 caractères</span>
                    </div>
                    <div class="password-rule" id="rule-uppercase">
                        <span class="rule-icon">✗</span>
                        <span class="rule-text">Une lettre majuscule</span>
                    </div>
                    <div class="password-rule" id="rule-lowercase">
                        <span class="rule-icon">✗</span>
                        <span class="rule-text">Une lettre minuscule</span>
                    </div>
                    <div class="password-rule" id="rule-number">
                        <span class="rule-icon">✗</span>
                        <span class="rule-text">Un chiffre</span>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="reg-password-confirm">Confirmer le mot de passe</label>
                <input type="password" id="reg-password-confirm" name="password-confirm" class="form-input"
                       placeholder="••••••••" required autocomplete="new-password">
            </div>

            <button type="submit" id="register-btn" class="auth-btn">
                Créer le compte
            </button>
        </form>

        <div class="register-link">
            <p><a href="#" id="back-to-login-link">Déjà un compte ? Se connecter</a></p>
        </div>
    </div>
</div>
{% endblock %}
